version: '3.8'

services:
  # ─── Infrastructure ───────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # ─── Services ─────────────────────────────────────────────────

  order-service:
    build: ./order-service
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/orders_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092

  payment-service:
    build: ./payment-service
    ports:
      - "8081:8081"
    depends_on:
      - kafka
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/payments_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092

  inventory-service:
    build: ./inventory-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""

  notification-service:
    build: ./notification-service
    ports:
      - "8083:8083"
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092

volumes:
  postgres_data: